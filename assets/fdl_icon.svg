<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#0c2040"/>
      <stop offset="100%" stop-color="#081830"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="40%" stop-color="#ffc830"/>
      <stop offset="100%" stop-color="#c89020"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40c8e8"/>
      <stop offset="100%" stop-color="#2090c0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.45">
      <stop offset="0%" stop-color="#1a4a7a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- الخلفية -->
  <rect x="8" y="8" width="496" height="496" rx="80" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="8" y="8" width="496" height="496" rx="80" fill="url(#glow)"/>

  <!-- اطار خارجي -->
  <rect x="18" y="18" width="476" height="476" rx="72" fill="none" stroke="#1a6090" stroke-width="1.2" opacity="0.3"/>

  <!-- نجوم -->
  <circle cx="75" cy="70" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="440" cy="85" r="1.2" fill="#fff" opacity="0.4"/>
  <circle cx="90" cy="440" r="1" fill="#fff" opacity="0.35"/>
  <circle cx="420" cy="430" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="256" cy="50" r="1" fill="#fff" opacity="0.25"/>

  <!-- زخرفة علوية -->
  <g opacity="0.15" stroke="#ffc830" stroke-width="0.8" fill="none">
    <polygon points="256,65 262,78 250,78"/>
    <line x1="224" y1="78" x2="288" y2="78"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--   كلمة "فاضل" — نص عربي حقيقي واضح       -->
  <!-- ═══════════════════════════════════════════ -->

  <text
    x="256" y="310"
    text-anchor="middle"
    font-family="'Tajawal','Noto Sans Arabic','Segoe UI','Tahoma','Arial',sans-serif"
    font-weight="800"
    font-size="190"
    fill="url(#gold)"
    filter="url(#textGlow)"
    direction="rtl"
    letter-spacing="8"
  >فاضل</text>

  <!-- خط ذهبي تحت الكلمة -->
  <line x1="90" y1="360" x2="422" y2="360" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="368" x2="392" y2="368" stroke="url(#gold)" stroke-width="0.8" opacity="0.15"/>

  <!-- §FDL§ بالانجليزية -->
  <text
    x="210" y="420"
    font-family="'JetBrains Mono','Consolas','Courier New',monospace"
    font-size="36"
    font-weight="700"
    fill="url(#teal)"
    opacity="0.75"
    filter="url(#subtleGlow)"
    letter-spacing="3"
  >§FDL§</text>

  <!-- v2.0 -->
  <text
    x="340" y="420"
    font-family="'JetBrains Mono','Consolas',monospace"
    font-size="18"
    fill="url(#teal)"
    opacity="0.4"
  >v2.0</text>

  <!-- دوائر جُمَّل زخرفية -->
  <circle cx="55" cy="256" r="14" fill="none" stroke="#ffc830" stroke-width="0.8" opacity="0.12"/>
  <circle cx="55" cy="256" r="6" fill="none" stroke="#ffc830" stroke-width="0.5" opacity="0.08"/>
  <circle cx="55" cy="256" r="2.5" fill="#ffc830" opacity="0.15"/>

  <circle cx="457" cy="256" r="14" fill="none" stroke="#ffc830" stroke-width="0.8" opacity="0.12"/>
  <circle cx="457" cy="256" r="6" fill="none" stroke="#ffc830" stroke-width="0.5" opacity="0.08"/>
  <circle cx="457" cy="256" r="2.5" fill="#ffc830" opacity="0.15"/>

  <!-- زخرفة سفلية -->
  <g opacity="0.1" stroke="#ffc830" stroke-width="0.6" fill="none">
    <line x1="100" y1="462" x2="412" y2="462"/>
    <circle cx="100" cy="462" r="2.5"/>
    <circle cx="412" cy="462" r="2.5"/>
    <circle cx="256" cy="462" r="3.5"/>
  </g>

  <!-- خطوط كود زخرفية -->
  <line x1="55" y1="55" x2="95" y2="55" stroke="#ffc830" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
  <line x1="55" y1="66" x2="80" y2="66" stroke="#40c8e8" stroke-width="1.5" opacity="0.08" stroke-linecap="round"/>
  <line x1="417" y1="55" x2="457" y2="55" stroke="#ffc830" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
  <line x1="430" y1="66" x2="457" y2="66" stroke="#40c8e8" stroke-width="1.5" opacity="0.08" stroke-linecap="round"/>
</svg>
